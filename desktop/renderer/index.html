<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'none'; font-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    >
    <title>AI Dev Bootstrap</title>
    <link rel="stylesheet" href="app://renderer/styles.css">
    <script type="module" src="app://renderer/app.js"></script>
  </head>
  <body>
    <main>
      <header class="masthead">
        <div>
          <p class="product-name">AI Dev Bootstrap</p>
          <h1>프로젝트에 안전하게 적용하기</h1>
          <p class="intro">폴더와 검토된 release를 선택한 뒤, 변경 계획을 먼저 확인합니다.</p>
        </div>
        <p class="safety-note">기본 상태에서는 어떤 파일도 변경하지 않습니다.</p>
      </header>

      <section class="setup" aria-labelledby="setup-title">
        <h2 id="setup-title">적용 대상</h2>
        <div class="selection-grid">
          <article>
            <p class="label">프로젝트 폴더</p>
            <p id="project-value" class="selection-value">선택되지 않음</p>
            <button id="select-project" type="button" class="secondary">폴더 선택</button>
          </article>
          <article>
            <p class="label">검토된 release</p>
            <p id="manifest-value" class="selection-value">선택되지 않음</p>
            <button id="select-manifest" type="button" class="secondary">Release 선택</button>
          </article>
        </div>
        <button id="preview" type="button" class="primary" disabled>변경 계획 확인</button>
      </section>

      <section id="result" class="result" aria-labelledby="result-title" aria-live="polite">
        <div class="result-heading">
          <div>
            <p class="label">현재 상태</p>
            <h2 id="result-title">변경 계획을 기다리고 있습니다</h2>
          </div>
          <p id="result-message">프로젝트와 release를 선택하세요.</p>
        </div>

        <dl class="counts" aria-label="파일 변경 요약">
          <div><dt>새로 만들기</dt><dd id="count-create">0</dd></div>
          <div><dt>업데이트</dt><dd id="count-update">0</dd></div>
          <div><dt>그대로 유지</dt><dd id="count-preserve">0</dd></div>
          <div><dt>차단</dt><dd id="count-blocked">0</dd></div>
        </dl>

        <details>
          <summary>파일별 계획과 오류 보기</summary>
          <ul id="details-list"></ul>
        </details>

        <div class="approval">
          <label>
            <input id="approval" type="checkbox" disabled>
            위 변경 계획을 확인했습니다.
          </label>
          <button id="apply" type="button" class="primary" disabled>프로젝트에 적용</button>
        </div>
      </section>

      <footer>
        <button id="validate" type="button" class="text-button" disabled>적용 상태 확인</button>
        <button id="rollback" type="button" class="text-button danger" disabled>이전 상태로 복구</button>
      </footer>
    </main>
  </body>
</html>

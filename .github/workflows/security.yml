name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install audited Node tools without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Audit locked Node dependencies
        run: npm audit --audit-level=high

      - name: Validate bootstrap and downstream policy
        run: |
          scripts/bootstrap preview
          scripts/validate .
          npm run test:ai-security-hook
          npm run test:handoff-validator
          npm run test:downstream-validator
          npm run test:adapter-manager
          npm run test:core-materializer
          npm run test:core-upgrade
          npm run test:upstream-lock
          npm run test:security-tool-manager
          npm run test:dependency-bootstrap
          npm run test:skill-evolution
          npm run test:skill-evolution-trial
          npm run test:pilot-results
          npm run test:production-readiness
          npm run test:readiness-materialization
          npm run test:project-onboarding
          npm run test:dependency-upgrade-validator

      - name: Install locked security tools
        run: scripts/bootstrap-security-tools

      - name: Verify CodeSight context is current
        run: |
          scripts/codesight-context generate
          git diff --exit-code -- .codesight

      - name: Require HANDOFF update for pull requests
        if: github.event_name == 'pull_request'
        run: node scripts/validate-handoff.mjs range "${{ github.event.pull_request.base.sha }}"

      - name: Require approval for dependency version changes
        if: github.event_name == 'pull_request'
        run: node scripts/validate-dependency-upgrades.mjs range "${{ github.event.pull_request.base.sha }}"

      - name: Run security checks
        run: scripts/security-check full

  license-provenance:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1

      - name: Test ScanCode report fail-closed policy
        run: node scripts/test-scancode-report-evaluator.mjs

      - name: Run network-isolated ScanCode license gate
        run: scripts/scancode-license-gate

      - name: Add sanitized ScanCode result to job summary
        if: always()
        run: |
          if test -f "${{ runner.temp }}/scancode-ci/output/summary.json"; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "${{ runner.temp }}/scancode-ci/output/summary.json" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload ScanCode evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scancode-license-evidence
          path: ${{ runner.temp }}/scancode-ci/output/summary.json
          if-no-files-found: error
          retention-days: 14

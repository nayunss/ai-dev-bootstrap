title = "Common project secret scanning policy"

[extend]
useDefault = true

[[allowlists]]
description = "Generated and dependency directories"
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)\.tools/''',
  '''(^|/)\.cache/''',
  '''(^|/)\.next/''',
  '''(^|/)\.security-reports/''',
  '''(^|/)playwright-report/''',
  '''(^|/)test-results/'''
]
